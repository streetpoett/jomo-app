<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOMO | 享受獨處地圖</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; }
        
        /* JOMO Header */
        .header-card {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); 
            padding: 12px 18px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border-left: 6px solid #2c3e50;
            backdrop-filter: blur(5px);
        }

        /* Filter Chips Container */
        .filter-container {
            position: absolute; top: 20px; left: 180px; /* Header 右邊 */
            z-index: 1000;
            display: flex; gap: 8px;
            overflow-x: auto; /* 手機版可以橫滑 */
            padding-right: 20px;
            max-width: calc(100% - 200px);
            scrollbar-width: none; /* 隱藏捲軸 */
        }
        
        /* 手機版調整：標題和篩選器分兩行 */
        @media (max-width: 600px) {
            .header-card { padding: 10px 15px; }
            .filter-container { top: 90px; left: 10px; max-width: 100%; }
        }

        /* Filter Button Style */
        .filter-btn {
            background: white; border: none;
            padding: 8px 16px; border-radius: 20px;
            font-size: 0.9rem; font-weight: bold; color: #555;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer; white-space: nowrap;
            transition: all 0.2s;
        }
        .filter-btn:hover { transform: translateY(-1px); }
        .filter-btn.active {
            background: #2c3e50; color: white;
            box-shadow: 0 4px 10px rgba(44, 62, 80, 0.4);
        }

        .legend {
            position: absolute; bottom: 30px; right: 20px; z-index: 1000;
            background: white; padding: 10px; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-size: 0.9rem;
        }
        .dot { height: 10px; width: 10px; display: inline-block; border-radius: 50%; margin-right: 5px; }

        .locate-btn {
            position: absolute; bottom: 140px; right: 20px; z-index: 1000;
            background: #2c3e50; color: white;
            width: 50px; height: 50px; border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.5rem; border: none;
        }
    </style>
</head>
<body>

    <div class="header-card">
        <h2 style="margin:0; color: #2c3e50; font-weight: 800;">🤫 JOMO</h2>
        <p style="margin:2px 0 0 0; color:#555; font-size: 0.75rem;">尋找你的隱形斗篷</p>
    </div>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterCategory('all', this)">全部</button>
        <button class="filter-btn" onclick="filterCategory('cafe', this)">☕ 咖啡</button>
        <button class="filter-btn" onclick="filterCategory('food', this)">🍜 美食</button>
        <button class="filter-btn" onclick="filterCategory('work', this)">💻 工作</button>
        <button class="filter-btn" onclick="filterCategory('bar', this)">🍸 酒吧</button>
    </div>

    <button class="locate-btn" onclick="locateUser()" title="定位我的位置">🎯</button>

    <div class="legend">
        <div><span class="dot" style="background:#2aad27;"></span>舒適</div>
        <div><span class="dot" style="background:#cb8427;"></span>普通</div>
        <div><span class="dot" style="background:#ca2828;"></span>擁擠</div>
        <div><span class="dot" style="background:#777;"></span>未知</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        var map = L.map('map').setView([25.0339, 121.5644], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        // Icons
        var commonSettings = { shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] };
        var greenIcon = new L.Icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', ...commonSettings});
        var goldIcon = new L.Icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-gold.png', ...commonSettings});
        var redIcon = new L.Icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', ...commonSettings});
        var greyIcon = new L.Icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-grey.png', ...commonSettings});
        var userIcon = L.divIcon({ className: 'user-marker', html: '<div style="width: 15px; height: 15px; background: #4285F4; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.3);"></div>', iconSize: [20, 20] });

        // 全域變數存資料
        var allRestaurants = []; 
        var markersLayer = L.layerGroup().addTo(map); // 用群組來管理圖標，方便清除

        function getIcon(level) {
            var lvl = parseInt(level);
            if (isNaN(lvl) || lvl === 0) return greyIcon;
            if (lvl <= 2) return greenIcon;
            if (lvl <= 4) return goldIcon;
            return redIcon;
        }

        function getCrowdStatus(level) {
            if (level <= 2) return "🟢 舒適";
            if (level <= 4) return "🟠 普通";
            if (level >= 5) return "🔴 擁擠";
            return "⚪ 未知";
        }

        // 核心功能：篩選邏輯
        function filterCategory(category, btnElement) {
            // 1. 切換按鈕樣式
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');

            // 2. 清除地圖上所有標記
            markersLayer.clearLayers();

            // 3. 重新加入符合條件的標記
            allRestaurants.forEach(r => {
                // 如果選 'all' 或者 類別符合，就加入
                // (注意：舊資料可能沒有 type，預設歸類到 'all' 或 'other')
                if (category === 'all' || r.type === category) {
                    addMarkerToMap(r);
                }
            });
        }

        function addMarkerToMap(r) {
            var navUrl = `http://googleusercontent.com/maps.google.com/?q=${r.latitude},${r.longitude}`;
            var marker = L.marker([r.latitude, r.longitude], {icon: getIcon(r.crowd_level)});
            
            marker.bindPopup(`
                <div style="font-size: 1.1em; margin-bottom: 5px;"><b>${r.name}</b></div>
                <div style="color: #555; margin-bottom: 8px;">
                    ⭐ ${r.rating} | ${getCrowdStatus(r.crowd_level)}
                </div>
                <div style="text-align: center;">
                    <a href="${navUrl}" target="_blank" 
                       style="display: inline-block; text-decoration: none; background-color: #4285F4; color: white; padding: 6px 12px; border-radius: 4px; font-size: 0.9rem;">
                       🚗 導航
                    </a>
                </div>
            `);
            markersLayer.addLayer(marker);
        }

        function locateUser() {
            if (!navigator.geolocation) { alert("不支援定位"); return; }
            document.querySelector('.locate-btn').innerHTML = '⏳';
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    map.flyTo([pos.coords.latitude, pos.coords.longitude], 15);
                    L.marker([pos.coords.latitude, pos.coords.longitude], {icon: userIcon}).addTo(map).bindPopup("<b>📍 我在這裡</b>").openPopup();
                    document.querySelector('.locate-btn').innerHTML = '🎯';
                },
                (err) => { alert("定位失敗"); document.querySelector('.locate-btn').innerHTML = '🎯'; }
            );
        }

        // 初始載入
        fetch('/restaurants').then(r => r.json()).then(data => {
            allRestaurants = data; // 存入全域變數
            filterCategory('all', document.querySelector('.filter-btn.active')); // 預設顯示全部
        });
    </script>
</body>
</html>
