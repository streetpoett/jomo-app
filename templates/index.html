<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOMO | 尋找你的隱形斗篷</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --bg-color: #fdfbf7; /* 溫暖的米白色 */
            --glass-bg: rgba(255, 255, 255, 0.9);
            --shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--bg-color);
            color: var(--primary-color);
            overflow: hidden; /* 防止捲動 */
        }

        /* --- 1. 首頁 (Landing Page) --- */
        #landing-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            background: linear-gradient(135deg, #fdfbf7 0%, #eef2f3 100%);
            z-index: 2000;
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .logo-container {
            text-align: center; margin-bottom: 40px;
        }

        .logo-text {
            font-size: 3.5rem; font-weight: 800; letter-spacing: 2px;
            color: var(--primary-color); margin: 0;
        }

        .slogan {
            font-size: 1.1rem; color: #7f8c8d; margin-top: 10px; font-weight: 400;
        }

        .category-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            width: 85%; max-width: 400px;
        }

        .cat-card {
            background: white; border-radius: 20px;
            padding: 20px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            cursor: pointer; transition: all 0.2s;
            border: 2px solid transparent;
        }

        .cat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }

        .cat-emoji { font-size: 2rem; display: block; margin-bottom: 10px; }
        .cat-name { font-weight: 700; color: var(--primary-color); }

        /* --- 2. 地圖介面 (Map Interface) --- */
        #app-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; visibility: hidden; /* 預設隱藏 */
            transition: opacity 0.5s ease;
        }

        #map { height: 100%; width: 100%; z-index: 1; }

        /* 頂部浮動導航列 */
        .top-bar {
            position: absolute; top: 20px; left: 50%; 
            transform: translateX(-50%);
            width: 90%; max-width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border-radius: 50px;
            padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow);
            z-index: 1000;
        }

        .mini-logo { font-weight: 800; font-size: 1.2rem; cursor: pointer; }
        
        .filter-scroll {
            display: flex; gap: 10px; overflow-x: auto; 
            padding: 5px; margin-left: 15px;
            scrollbar-width: none; /* Firefox */
        }
        .filter-scroll::-webkit-scrollbar { display: none; } /* Chrome */

        .chip {
            background: transparent; border: 1px solid #ddd;
            padding: 6px 14px; border-radius: 20px;
            font-size: 0.85rem; color: #666; cursor: pointer;
            white-space: nowrap; transition: 0.2s;
        }
        .chip.active {
            background: var(--primary-color); color: white; border-color: var(--primary-color);
        }

        /* 底部功能區 */
        .bottom-controls {
            position: absolute; bottom: 30px; right: 20px;
            display: flex; flex-direction: column; gap: 15px;
            z-index: 1000;
        }

        .fab-btn {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--primary-color); color: white;
            border: none; box-shadow: var(--shadow);
            font-size: 1.4rem; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.1s;
        }
        .fab-btn:active { transform: scale(0.9); }
        
        /* 隱藏預設的 Leaflet 版權文字，讓畫面更乾淨 (可選) */
        .leaflet-control-attribution { font-size: 9px !important; opacity: 0.6; }

    </style>
</head>
<body>

    <div id="landing-page">
        <div class="logo-container">
            <h1 class="logo-text">🤫 JOMO</h1>
            <p class="slogan">Joy Of Missing Out.<br>尋找城市裡的靜謐角落。</p>
        </div>

        <div class="category-grid">
            <div class="cat-card" onclick="enterApp('cafe')">
                <span class="cat-emoji">☕</span>
                <span class="cat-name">安靜咖啡</span>
            </div>
            <div class="cat-card" onclick="enterApp('work')">
                <span class="cat-emoji">💻</span>
                <span class="cat-name">讀書工作</span>
            </div>
            <div class="cat-card" onclick="enterApp('food')">
                <span class="cat-emoji">🍜</span>
                <span class="cat-name">不用排隊</span>
            </div>
            <div class="cat-card" onclick="enterApp('all')">
                <span class="cat-emoji">🗺️</span>
                <span class="cat-name">探索地圖</span>
            </div>
        </div>
    </div>

    <div id="app-container">
        
        <div class="top-bar">
            <div class="mini-logo" onclick="goHome()">JOMO</div>
            <div class="filter-scroll">
                <div class="chip" onclick="filterCategory('all', this)">全部</div>
                <div class="chip" onclick="filterCategory('cafe', this)">☕ 咖啡</div>
                <div class="chip" onclick="filterCategory('food', this)">🍜 美食</div>
                <div class="chip" onclick="filterCategory('work', this)">💻 工作</div>
            </div>
        </div>

        <div class="bottom-controls">
            <button class="fab-btn" onclick="locateUser()">🎯</button>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- 邏輯部分 ---
        
        // 1. 初始化地圖 (使用更有質感的 CartoDB Voyager 圖層)
        var map = L.map('map', {zoomControl: false}).setView([25.0339, 121.5644], 14);
        
        // *關鍵改變*：更換地圖風格
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // 自定義圖標
        var commonSettings = { shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] };
        var greenIcon = new L.Icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', ...commonSettings});
        var goldIcon = new L.Icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-gold.png', ...commonSettings});
        var redIcon = new L.Icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', ...commonSettings});
        var greyIcon = new L.Icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-grey.png', ...commonSettings});
        var userIcon = L.divIcon({ className: 'user-marker', html: '<div style="width: 15px; height: 15px; background: #2c3e50; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.3);"></div>', iconSize: [20, 20] });

        var markersLayer = L.layerGroup().addTo(map);
        var allRestaurants = [];

        // 2. 進入 App 流程
        function enterApp(category) {
            // 隱藏首頁，顯示地圖
            document.getElementById('landing-page').style.transform = 'translateY(-100%)';
            document.getElementById('app-container').style.visibility = 'visible';
            document.getElementById('app-container').style.opacity = '1';
            
            // 修正 Leaflet 在隱藏 div 重新顯示時的大小問題
            setTimeout(() => { map.invalidateSize(); }, 300);

            // 自動點選對應的篩選器
            var chipToClick = document.querySelector(`.chip[onclick*="'${category}'"]`);
            if (!chipToClick) chipToClick = document.querySelector(`.chip[onclick*="'all'"]`);
            
            filterCategory(category, chipToClick);
        }

        function goHome() {
            document.getElementById('landing-page').style.transform = 'translateY(0)';
            document.getElementById('app-container').style.opacity = '0';
            setTimeout(() => { document.getElementById('app-container').style.visibility = 'hidden'; }, 500);
        }

        // 3. 篩選與標記
        function filterCategory(category, chip) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            if(chip) chip.classList.add('active');

            markersLayer.clearLayers();
            allRestaurants.forEach(r => {
                // 如果分類符合 (相容舊資料的 fallback)
                var rType = r.type || 'other';
                if (category === 'all' || rType === category) {
                    addMarker(r);
                }
            });
        }

        function getIcon(level) {
            var lvl = parseInt(level);
            if (isNaN(lvl) || lvl === 0) return greyIcon;
            if (lvl <= 2) return greenIcon;
            if (lvl <= 4) return goldIcon;
            return redIcon;
        }

        function getStatusText(level) {
            if (level <= 2) return "🟢 舒適";
            if (level <= 4) return "🟠 普通";
            if (level >= 5) return "🔴 擁擠";
            return "⚪ 未知";
        }

        function addMarker(r) {
            var marker = L.marker([r.latitude, r.longitude], {icon: getIcon(r.crowd_level)});
            var navUrl = `http://googleusercontent.com/maps.google.com/?q=${r.latitude},${r.longitude}`;
            
            marker.bindPopup(`
                <div style="font-family: 'Noto Sans TC';">
                    <h3 style="margin: 0 0 5px 0; color: #2c3e50;">${r.name}</h3>
                    <p style="margin: 0 0 10px 0; color: #7f8c8d; font-size: 0.9rem;">
                        ⭐ ${r.rating} | ${getStatusText(r.crowd_level)}
                    </p>
                    <a href="${navUrl}" target="_blank" style="display:block; text-align:center; background:#2c3e50; color:white; padding:8px; border-radius:8px; text-decoration:none;">
                        🚗 Google 導航
                    </a>
                </div>
            `);
            markersLayer.addLayer(marker);
        }

        function locateUser() {
            if (!navigator.geolocation) return alert("無法定位");
            navigator.geolocation.getCurrentPosition(pos => {
                map.flyTo([pos.coords.latitude, pos.coords.longitude], 15);
                L.marker([pos.coords.latitude, pos.coords.longitude], {icon: userIcon}).addTo(map);
            });
        }

        // Fetch Data
        fetch('/restaurants').then(res => res.json()).then(data => {
            allRestaurants = data;
        });

    </script>
</body>
</html>
